<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Your Trip — Wandr</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'Jost', sans-serif; font-weight: 300; color: #f0ead6; min-height: 100vh; }

    .q-nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; border-bottom: 0.5px solid rgba(212,175,55,0.2); gap: 1rem; }
    .q-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; flex-shrink: 0; }
    .q-progress-wrap { flex: 1; min-width: 0; }
    .q-progress-bar { height: 1px; background: rgba(212,175,55,0.15); border-radius: 1px; overflow: hidden; }
    .q-progress-fill { height: 100%; background: #d4af37; transition: width 0.4s ease; }
    .q-progress-label { font-size: 11px; color: #4a4538; letter-spacing: 1px; margin-top: 4px; text-align: right; }

    .q-main { min-height: calc(100vh - 65px); display: flex; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; }
    .q-card { width: 100%; max-width: 560px; }
    .q-step-tag { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #d4af37; margin-bottom: 1rem; }
    .q-question { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 6vw, 36px); font-weight: 300; color: #f5edd8; line-height: 1.2; margin-bottom: 1.75rem; }
    .q-multi-hint { font-size: 11px; color: #4a4538; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.75rem; }
    .q-options { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.75rem; }
    .q-option { background: transparent; border: 0.5px solid rgba(212,175,55,0.25); color: #c8bfa0; padding: 0.9rem 1.25rem; font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300; letter-spacing: 0.5px; cursor: pointer; border-radius: 2px; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; min-height: 48px; }
    .q-option:hover { border-color: #d4af37; color: #f5edd8; background: rgba(212,175,55,0.05); }
    .q-option.selected { border-color: #d4af37; color: #f5edd8; background: rgba(212,175,55,0.08); }
    .q-option-dot { width: 6px; height: 6px; border-radius: 50%; border: 0.5px solid rgba(212,175,55,0.4); flex-shrink: 0; transition: background 0.2s; }
    .q-option.selected .q-option-dot { background: #d4af37; border-color: #d4af37; }
    .q-input { background: transparent; border: 0.5px solid rgba(212,175,55,0.25); color: #f5edd8; padding: 0.9rem 1.25rem; font-family: 'Jost', sans-serif; font-size: 16px; font-weight: 300; width: 100%; border-radius: 2px; margin-bottom: 1.5rem; outline: none; }
    .q-input:focus { border-color: #d4af37; }
    .q-input::placeholder { color: #4a4538; }
    .q-actions { display: flex; justify-content: space-between; align-items: center; }
    .q-btn-next { background: #d4af37; color: #0f0f0f; border: none; padding: 14px 32px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: background 0.2s; min-height: 48px; }
    .q-btn-next:hover { background: #c9a227; }
    .q-btn-next:disabled { background: rgba(212,175,55,0.2); color: #4a4538; cursor: not-allowed; }
    .q-btn-back { background: transparent; border: none; color: #4a4538; font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 1px; cursor: pointer; padding: 14px 0; transition: color 0.2s; min-height: 48px; }
    .q-btn-back:hover { color: #d4af37; }

    .r-wrap { width: 100%; max-width: 620px; }
    .r-tag { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #d4af37; margin-bottom: 1rem; }
    .r-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 7vw, 38px); font-weight: 300; color: #f5edd8; margin-bottom: 0.4rem; line-height: 1.15; }
    .r-subtitle { font-size: 13px; color: #6e6757; margin-bottom: 1.75rem; letter-spacing: 0.5px; }

    .r-glimpse { border: 0.5px solid rgba(212,175,55,0.2); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
    .r-glimpse-header { background: rgba(212,175,55,0.08); padding: 0.875rem 1.25rem; border-bottom: 0.5px solid rgba(212,175,55,0.15); display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .r-glimpse-label { font-size: 11px; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; }
    .r-glimpse-badge { font-size: 10px; color: #4a4538; letter-spacing: 1px; text-transform: uppercase; background: rgba(212,175,55,0.06); padding: 3px 10px; border: 0.5px solid rgba(212,175,55,0.15); border-radius: 2px; white-space: nowrap; }
    .r-glimpse-body { padding: 1.25rem 1.25rem 0; }
    .r-glimpse-text { font-size: 14px; color: #a89f87; line-height: 1.9; white-space: pre-wrap; }
    .r-glimpse-fade { height: 80px; background: linear-gradient(transparent, #0f0f0f); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 1rem; }
    .r-glimpse-more { font-size: 12px; color: #4a4538; letter-spacing: 1.5px; text-transform: uppercase; }

    .r-email-box { border: 0.5px solid rgba(212,175,55,0.25); border-radius: 2px; padding: 1.25rem; margin-bottom: 1rem; }
    .r-email-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: #f5edd8; margin-bottom: 0.4rem; }
    .r-email-hint { font-size: 13px; color: #6e6757; margin-bottom: 1rem; line-height: 1.6; }
    .r-row { display: flex; gap: 0.75rem; }
    .r-input { background: transparent; border: 0.5px solid rgba(212,175,55,0.25); color: #f5edd8; padding: 12px 1rem; font-family: 'Jost', sans-serif; font-size: 16px; border-radius: 2px; outline: none; width: 100%; min-height: 48px; }
    .r-input:focus { border-color: #d4af37; }
    .r-input::placeholder { color: #4a4538; }
    .r-btn-gold { background: #d4af37; color: #0f0f0f; border: none; padding: 12px 20px; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 2px; white-space: nowrap; transition: background 0.2s; min-height: 48px; }
    .r-btn-gold:hover { background: #c9a227; }
    .r-sent { font-size: 12px; color: #d4af37; letter-spacing: 1px; margin-top: 0.75rem; display: none; }

    .r-divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .r-divider-line { flex: 1; height: 0.5px; background: rgba(212,175,55,0.12); }
    .r-divider-text { font-size: 11px; color: #4a4538; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }

    .r-premium { border: 0.5px solid rgba(212,175,55,0.4); border-radius: 2px; padding: 1.5rem 1.25rem; background: rgba(212,175,55,0.03); }
    .r-premium-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: 1rem; }
    .r-premium-badge { font-size: 10px; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; background: rgba(212,175,55,0.1); border: 0.5px solid rgba(212,175,55,0.3); padding: 4px 12px; border-radius: 2px; flex-shrink: 0; }
    .r-premium-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: #f5edd8; margin-bottom: 0.4rem; }
    .r-premium-sub { font-size: 13px; color: #6e6757; }
    .r-perks { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .r-perk { display: flex; align-items: center; gap: 0.6rem; font-size: 13px; color: #a89f87; }
    .r-perk-dot { width: 4px; height: 4px; border-radius: 50%; background: #d4af37; flex-shrink: 0; }
    .r-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .r-form-full { margin-bottom: 0.75rem; }
    .r-label { font-size: 11px; color: #4a4538; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 0.4rem; display: block; }
    .r-select { width: 100%; background: #0f0f0f; border: 0.5px solid rgba(212,175,55,0.25); color: #c8bfa0; padding: 12px 1rem; font-family: 'Jost', sans-serif; font-size: 16px; border-radius: 2px; outline: none; appearance: none; cursor: pointer; min-height: 48px; }
    .r-select:focus { border-color: #d4af37; }
    .r-book-sent { font-size: 12px; color: #d4af37; letter-spacing: 1px; margin-top: 0.75rem; display: none; line-height: 1.6; }
    .r-restart { font-size: 12px; color: #4a4538; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; background: none; font-family: 'Jost', sans-serif; margin-top: 1.5rem; display: block; transition: color 0.2s; padding: 0.5rem 0; }
    .r-restart:hover { color: #d4af37; }
    .r-loading { display: flex; align-items: center; gap: 0.75rem; color: #4a4538; font-size: 13px; letter-spacing: 1px; }
    .r-dot-anim { display: flex; gap: 4px; }
    .r-dot-anim span { width: 4px; height: 4px; background: #d4af37; border-radius: 50%; animation: dp 1.2s ease-in-out infinite; }
    .r-dot-anim span:nth-child(2) { animation-delay: 0.2s; }
    .r-dot-anim span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dp { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

    @media (max-width: 520px) {
      .q-main { padding: 2rem 1.25rem; align-items: flex-start; padding-top: 2.5rem; }
      .r-row { flex-direction: column; }
      .r-btn-gold { width: 100%; }
      .r-form-grid { grid-template-columns: 1fr; }
      .r-divider-text { font-size: 10px; letter-spacing: 1px; }
    }
  </style>
</head>
<body>

  <nav class="q-nav">
    <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6 C10 6 6 10 6 18 C6 26 10 30 18 30 C26 30 30 26 30 18 C30 10 26 6 18 6Z" stroke="#d4af37" stroke-width="0.75" fill="none"/>
        <path d="M18 6 C14 10 12 14 12 18 C12 22 14 26 18 30" stroke="#d4af37" stroke-width="0.75" fill="none"/>
        <path d="M18 6 C22 10 24 14 24 18 C24 22 22 26 18 30" stroke="rgba(212,175,55,0.5)" stroke-width="0.5" fill="none"/>
        <path d="M7 12 L29 12" stroke="rgba(212,175,55,0.3)" stroke-width="0.5"/>
        <path d="M7 24 L29 24" stroke="rgba(212,175,55,0.3)" stroke-width="0.5"/>
        <path d="M6 18 L30 18" stroke="rgba(212,175,55,0.25)" stroke-width="0.5"/>
        <circle cx="18" cy="18" r="1.5" fill="#d4af37"/>
      </svg>
      <div>
        <div style="font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:#f5edd8; letter-spacing:7px; text-transform:uppercase; line-height:1;">Wandr</div>
        <div style="font-size:8px; letter-spacing:3.5px; text-transform:uppercase; color:rgba(212,175,55,0.55); font-family:'Jost',sans-serif; font-weight:300;">Curated travel</div>
      </div>
    </a>
    <div class="q-progress-wrap">
      <div class="q-progress-bar"><div class="q-progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="q-progress-label" id="progressLabel">Step 1 of 7</div>
    </div>
  </nav>

  <div class="q-main" id="qMain">
    <div class="q-card" id="qCard"></div>
  </div>

  <script>

    const questions = [
      { id: 'traveller_type', tag: 'About you', question: 'Who are you travelling with?', type: 'single', options: ['Solo', 'With a partner', 'Family with kids', 'Group of friends', 'Work / Group travel'] },
      { id: 'destination', tag: 'Destination', question: 'Do you have a destination in mind?', type: 'single', options: ['Yes, I know where I want to go', 'No, surprise me with a recommendation'] },
      { id: 'destination_name', tag: 'Destination', question: 'Where would you like to go?', type: 'text', placeholder: 'e.g. Kyoto, Patagonia, Morocco...', condition: (ans) => ans.destination === 'Yes, I know where I want to go' },
      { id: 'duration', tag: 'Your trip', question: 'How long is your trip?', type: 'single', options: ['A weekend (2–3 days)', 'About a week', 'Two weeks', 'A month or more'] },
      { id: 'pace', tag: 'Your style', question: 'How do you like to travel?', type: 'single', options: ['Laid-back — slow down and soak it in', 'Balanced — a bit of everything', 'Action-packed — see as much as possible'] },
      { id: 'vibe', tag: 'Your style', question: 'What kind of experiences excite you?', type: 'multi', options: ['Adventure & outdoors', 'Culture & history', 'Food & nightlife', 'Wellness & relaxation', 'Hidden gems & offbeat', 'Mainstream highlights'] },
      { id: 'budget', tag: 'Budget', question: 'What is your travel budget like?', type: 'single', options: ['Budget — keep costs low', 'Mid-range — comfort without splurging', 'Premium — I want the best experience'] }
    ];

    let current = 0;
    let answers = {};
    let visibleQuestions = [];

    function getVisible() {
      return questions.filter(q => !q.condition || q.condition(answers));
    }

    function render() {
      visibleQuestions = getVisible();
      const total = visibleQuestions.length;
      const q = visibleQuestions[current];
      const pct = Math.round((current / total) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = 'Step ' + (current + 1) + ' of ' + total;
      const card = document.getElementById('qCard');
      const saved = answers[q.id];
      let optionsHtml = '';
      if (q.type === 'single') {
        optionsHtml = `<div class="q-options">` +
          q.options.map(o => `<button class="q-option${saved === o ? ' selected' : ''}" onclick="selectSingle('${q.id}', this, '${o.replace(/'/g, "\\'")}')"><span class="q-option-dot"></span>${o}</button>`).join('') +
          `</div>`;
      } else if (q.type === 'multi') {
        const sel = saved || [];
        optionsHtml = `<div class="q-multi-hint">Select all that apply</div><div class="q-options">` +
          q.options.map(o => `<button class="q-option${sel.includes(o) ? ' selected' : ''}" onclick="selectMulti('${q.id}', this, '${o.replace(/'/g, "\\'")}')"><span class="q-option-dot"></span>${o}</button>`).join('') +
          `</div>`;
      } else if (q.type === 'text') {
        optionsHtml = `<input class="q-input" id="textInput" type="text" placeholder="${q.placeholder}" value="${saved || ''}" oninput="answers['${q.id}']=this.value; updateNext()" />`;
      }
      const canNext = q.type === 'single' ? !!saved : q.type === 'multi' ? (saved && saved.length > 0) : !!(saved && saved.trim());
      card.innerHTML = `
        <div class="q-step-tag">${q.tag}</div>
        <div class="q-question">${q.question}</div>
        ${optionsHtml}
        <div class="q-actions">
          <button class="q-btn-back" onclick="goBack()" style="visibility:${current === 0 ? 'hidden' : 'visible'}">← Back</button>
          <button class="q-btn-next" id="btnNext" onclick="goNext()" ${canNext ? '' : 'disabled'}>
            ${current === visibleQuestions.length - 1 ? 'Generate my itinerary' : 'Continue'}
          </button>
        </div>`;
    }

    function updateNext() {
      const q = visibleQuestions[current];
      const saved = answers[q.id];
      document.getElementById('btnNext').disabled = !(saved && saved.trim());
    }

    function selectSingle(id, el, val) {
      answers[id] = val;
      document.querySelectorAll('.q-option').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('btnNext').disabled = false;
    }

    function selectMulti(id, el, val) {
      if (!answers[id]) answers[id] = [];
      if (el.classList.contains('selected')) {
        answers[id] = answers[id].filter(v => v !== val);
        el.classList.remove('selected');
      } else {
        answers[id].push(val);
        el.classList.add('selected');
      }
      document.getElementById('btnNext').disabled = answers[id].length === 0;
    }

    function goNext() {
      visibleQuestions = getVisible();
      if (current < visibleQuestions.length - 1) {
        current++;
        render();
      } else {
        submitPlannerAnswers();
        showResult();
      }
    }
    
    async function submitPlannerAnswers() {
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            'secret': 'wandr2026secure',
            'honeypot': '',
            'Form': 'Planner Responses',
            'Session ID': SESSION_ID,
            'Travelling As': answers.traveller_type || '',
            'Has Destination': answers.destination || '',
            'Destination': answers.destination_name || 'Undecided',
            'Duration': answers.duration || '',
            'Pace': answers.pace || '',
            'Interests': (answers.vibe || []).join(', '),
            'Budget': answers.budget || ''
          })
        });
      } catch(e) {}
    }

    function goBack() {
      if (current > 0) { current--; render(); }
    }

    async function showResult() {
      const main = document.getElementById('qMain');
      const dest = answers.destination_name || 'a destination we recommend for you';
      const traveller = answers.traveller_type || 'traveller';
      const duration = answers.duration || 'a week';
      const pace = answers.pace || 'balanced';
      const vibes = (answers.vibe || []).join(', ');
      const budget = answers.budget || 'mid-range';

      main.style.alignItems = 'flex-start';
      main.style.paddingTop = '2.5rem';

      main.innerHTML = `
        <div class="r-wrap">
          <div class="r-tag">Your personalised itinerary</div>
          <div class="r-title">Your trip to ${dest}</div>
          <div class="r-subtitle">${traveller} · ${duration} · ${pace.split('—')[0].trim()}</div>

          <div class="r-glimpse">
            <div class="r-glimpse-header">
              <span class="r-glimpse-label">Itinerary preview</span>
              <span class="r-glimpse-badge">Full plan via email</span>
            </div>
            <div class="r-glimpse-body">
              <div class="r-glimpse-text" id="glimpseText">
                <div class="r-loading"><div class="r-dot-anim"><span></span><span></span><span></span></div>Crafting your itinerary...</div>
              </div>
            </div>
            <div class="r-glimpse-fade">
              <span class="r-glimpse-more">Continue reading in your inbox ↓</span>
            </div>
          </div>

          <div class="r-email-box">
            <div class="r-email-title">Get your full itinerary</div>
            <div class="r-email-hint">We'll send your complete day-by-day plan, curated tips, and local recommendations straight to your inbox.</div>
            <div class="r-row">
              <input class="r-input" id="emailInput" type="email" placeholder="your@email.com" />
              <button class="r-btn-gold" onclick="submitEmail(this)">Send it</button>
            </div>
            <div class="r-sent" id="emailSent">✓ Your full itinerary is on its way.</div>
          </div>

          <div class="r-divider">
            <div class="r-divider-line"></div>
            <div class="r-divider-text">Want something more personal?</div>
            <div class="r-divider-line"></div>
          </div>

          <div class="r-premium">
            <div class="r-premium-top">
              <div>
                <div class="r-premium-title">Work with a travel consultant</div>
                <div class="r-premium-sub">One-on-one session to craft your perfect trip</div>
              </div>
              <div class="r-premium-badge">Premium</div>
            </div>
            <div class="r-perks">
              <div class="r-perk"><span class="r-perk-dot"></span>Personalised advice from an expert who has been there</div>
              <div class="r-perk"><span class="r-perk-dot"></span>Insider tips, hidden gems and local contacts</div>
              <div class="r-perk"><span class="r-perk-dot"></span>Flexible planning session by call or WhatsApp</div>
              <div class="r-perk"><span class="r-perk-dot"></span>Ongoing support while you travel</div>
            </div>
            <div class="r-form-grid">
              <div>
                <label class="r-label">Your name</label>
                <input class="r-input" id="bookName" type="text" placeholder="Your name" />
              </div>
              <div>
                <label class="r-label">Email</label>
                <input class="r-input" id="bookEmail" type="email" placeholder="you@email.com" />
              </div>
            </div>
            <div class="r-form-grid">
              <div>
                <label class="r-label">WhatsApp number</label>
                <input class="r-input" id="bookWA" type="tel" placeholder="+91 98765 43210" />
              </div>
              <input type="text" id="hpot" name="honeypot" 
              style="display:none; position:absolute; left:-9999px;" 
              tabindex="-1" autocomplete="off" />
              <div>
                <label class="r-label">Preferred time to connect</label>
                <select class="r-select" id="bookTime">
                  <option value="">Select a slot</option>
                  <option>Weekday morning (9am – 12pm)</option>
                  <option>Weekday afternoon (12pm – 5pm)</option>
                  <option>Weekday evening (5pm – 8pm)</option>
                  <option>Weekend morning (9am – 12pm)</option>
                  <option>Weekend afternoon (12pm – 5pm)</option>
                </select>
              </div>
            </div>
            <div class="r-form-full">
              <label class="r-label">Anything you'd like to discuss?</label>
              <input class="r-input" id="bookNote" type="text" placeholder="e.g. travelling with elderly parents, budget constraints..." />
            </div>
            <button class="r-btn-gold" style="width:100%; padding:14px;" onclick="submitBooking()">Request a consultation session</button>
            <div class="r-book-sent" id="bookSent">✓ We've received your request. Your consultant will reach out within 24 hours to confirm your session.</div>
          </div>

          <button class="r-restart" onclick="restartFlow()">← Plan another trip</button>
        </div>`;

      const prompt = `You are an expert travel planner. Create a detailed day-by-day itinerary for the following traveller:
- Travelling as: ${traveller}
- Destination: ${dest}
- Duration: ${duration}
- Travel pace: ${pace}
- Interests: ${vibes}
- Budget: ${budget}

Format as Day 1:, Day 2: etc. with morning, afternoon and evening for each day. Be specific, practical and inspiring. Max 400 words. Start directly with Day 1.`;

      try {
